<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-BOS · Finance & Operations</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #34d399; --bg: #06070b; --surface: #111318; --border: #1e2130; --text: #e2e8f0; --muted: #5a6480; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before { content:''; position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 60% 40% at 80% 0%, rgba(52,211,153,0.1) 0%, transparent 70%); pointer-events:none; }
  </style>
  <link rel="stylesheet" href="/departments/dept.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">
  <nav class="dept-nav">
    <div class="dept-nav-left">
      <a href="/dashboard" class="back-btn">← AI-BOS</a>
      <div class="dept-badge" style="background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.4);color:#34d399">
        💰 Finance & Ops
      </div>
      <span class="dept-subtitle">Cash Flow · Invoicing · Ledger</span>
    </div>
    <div class="dept-nav-right">
      <a href="/war-room" class="war-room-btn">💬 War Room</a>
      <div class="dept-links">
        <a href="/department/it">☁️ IT</a>
        <a href="/department/hr">👥 HR</a>
        <a href="/department/marketing">📣 Marketing</a>
      </div>
    </div>
  </nav>

  <main class="dept-main">
    <div class="kpi-row" id="kpi-row"></div>

    <div class="dept-grid">
      <!-- Ledger -->
      <div class="dept-card" style="grid-column: span 2">
        <div class="card-header">
          <div class="card-title">📒 General Ledger</div>
          <div style="display:flex;gap:8px">
            <button class="filter-btn active" onclick="filterLedger('all',this)">All</button>
            <button class="filter-btn" onclick="filterLedger('expense',this)">Expenses</button>
            <button class="filter-btn" onclick="filterLedger('revenue',this)">Revenue</button>
            <a href="/api/finance/ledger/export" class="add-btn" style="text-decoration:none" download>⬇ CSV</a>
            <button class="add-btn" onclick="openLedgerModal()">+ Add Entry</button>
          </div>
        </div>
        <div id="ledger-list" class="data-list"></div>
      </div>

      <!-- Charts -->
      <div class="dept-card">
        <div class="card-title" style="margin-bottom:14px">📊 Revenue vs Expenses</div>
        <canvas id="chart-rev-exp" height="180"></canvas>
      </div>
      <div class="dept-card">
        <div class="card-title" style="margin-bottom:14px">🧾 Spend by Category</div>
        <canvas id="chart-category" height="180"></canvas>
      </div>

      <!-- Invoices -->
      <div class="dept-card" style="grid-column: span 2">
        <div class="card-header">
          <div class="card-title">🧾 Invoices</div>
          <button class="add-btn" onclick="openInvoiceModal()">+ New Invoice</button>
        </div>
        <div id="invoices-list" class="data-list"></div>
      </div>
    </div>
  </main>
</div>

<!-- Ledger Modal -->
<div id="ledger-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-header"><span>Add Ledger Entry</span><button onclick="closeModal('ledger-modal')">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Description</label><input id="l-desc" placeholder="What is this for?"></div>
      <div class="field-row">
        <div class="field"><label>Amount ($)</label><input id="l-amount" type="number" min="0" step="0.01" placeholder="0.00"></div>
        <div class="field"><label>Type</label>
          <select id="l-type"><option value="expense">Expense</option><option value="revenue">Revenue</option></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Category</label><input id="l-category" placeholder="e.g. Payroll, SaaS, Sales"></div>
        <div class="field"><label>Project (optional)</label><input id="l-project" placeholder="Project name"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('ledger-modal')">Cancel</button>
      <button class="btn-primary" onclick="createEntry()">Add Entry</button>
    </div>
  </div>
</div>

<!-- Invoice Modal -->
<div id="invoice-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-header"><span>New Invoice</span><button onclick="closeModal('invoice-modal')">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Client Name</label><input id="i-client" placeholder="Client or company name"></div>
      <div class="field"><label>Due Date</label><input id="i-due" type="date"></div>
      <div id="items-list" style="display:flex;flex-direction:column;gap:8px"></div>
      <button class="filter-btn" onclick="addItem()" style="width:100%;text-align:center">+ Add Line Item</button>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('invoice-modal')">Cancel</button>
      <button class="btn-primary" onclick="createInvoice()">Create Invoice</button>
    </div>
  </div>
</div>

<script src="/departments/dept.js"></script>
<script>
if (!localStorage.getItem('aibos_token')) window.location.href = '/login';

const TYPE_COLOR = { expense:'#f87171', revenue:'#34d399' };
const INV_COLOR  = { draft:'#5a6480', sent:'#f59e0b', paid:'#34d399', overdue:'#f87171' };
let allEntries = [], ledgerFilter = 'all', invoiceItems = [];

async function load() {
  const [lRes, iRes] = await Promise.all([
    apiFetch('/api/finance/ledger'),
    apiFetch('/api/finance/invoices'),
  ]);
  allEntries = await lRes.json();
  const invoices = await iRes.json();
  const summary = allEntries.reduce((s, e) => {
    if (e.type === 'revenue') s.revenue += e.amount;
    else s.expenses += e.amount;
    return s;
  }, { revenue: 0, expenses: 0 });
  renderKPIs(summary, invoices);
  renderLedger();
  renderInvoices(invoices);
  renderCharts(allEntries);
}

function renderKPIs(sum, invoices) {
  const net = sum.revenue - sum.expenses;
  const pending = invoices.filter(i => i.status === 'sent').reduce((s,i) => s+i.total, 0);
  document.getElementById('kpi-row').innerHTML = [
    { label:'Total Revenue', value: formatCurrency(sum.revenue), color:'#34d399' },
    { label:'Total Expenses', value: formatCurrency(sum.expenses), color:'#f87171' },
    { label:'Net / Profit', value: formatCurrency(net), color: net >= 0 ? '#34d399' : '#f87171' },
    { label:'Pending Invoices', value: formatCurrency(pending), color:'#f59e0b' },
  ].map(k => `<div class="kpi-card"><div class="kpi-val" style="color:${k.color};font-size:1.4rem">${k.value}</div><div class="kpi-label">${k.label}</div></div>`).join('');
}

function filterLedger(type, btn) {
  ledgerFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLedger();
}

function renderLedger() {
  const items = ledgerFilter === 'all' ? allEntries : allEntries.filter(e => e.type === ledgerFilter);
  document.getElementById('ledger-list').innerHTML = items.length ? items.map(e => `
    <div class="list-row">
      <div class="list-main">
        <span class="badge" style="background:${TYPE_COLOR[e.type]}22;color:${TYPE_COLOR[e.type]};border-color:${TYPE_COLOR[e.type]}44">${e.type}</span>
        <div>
          <div class="list-title">${e.description}</div>
          <div class="list-sub">${e.category}${e.project ? ' · ' + e.project : ''} · ${formatTimeAgo(e.date)}</div>
        </div>
      </div>
      <div class="list-actions">
        <span style="font-weight:600;color:${TYPE_COLOR[e.type]};font-size:0.9rem">${e.type === 'expense' ? '-' : '+'}${formatCurrency(e.amount)}</span>
        <button class="del-btn" onclick="deleteEntry('${e.id}')">✕</button>
      </div>
    </div>`).join('') : '<div class="empty-state">No entries yet</div>';
}

function renderInvoices(invoices) {
  document.getElementById('invoices-list').innerHTML = invoices.length ? invoices.map(inv => `
    <div class="list-row">
      <div class="list-main">
        <div>
          <div class="list-title">${inv.id} · ${inv.client}</div>
          <div class="list-sub">${inv.items.length} items · Due ${inv.dueDate || 'TBD'}</div>
        </div>
      </div>
      <div class="list-actions">
        <span style="font-weight:600;font-size:0.9rem">${formatCurrency(inv.total)}</span>
        <select onchange="changeInvoiceStatus('${inv.id}',this.value)" class="status-select" style="color:${INV_COLOR[inv.status]||'#5a6480'}">
          ${['draft','sent','paid','overdue'].map(s => `<option value="${s}" ${s===inv.status?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>`).join('') : '<div class="empty-state">No invoices yet</div>';
}

async function createEntry() {
  const body = { description: v('l-desc'), amount: parseFloat(v('l-amount')), type: v('l-type'), category: v('l-category'), project: v('l-project') };
  if (!body.description || !body.amount) return;
  await apiFetch('/api/finance/ledger', { method:'POST', body: JSON.stringify(body) });
  closeModal('ledger-modal'); load();
}

async function deleteEntry(id) {
  await apiFetch(`/api/finance/ledger/${id}`, { method:'DELETE' }); load();
}

async function changeInvoiceStatus(id, status) {
  await apiFetch(`/api/finance/invoices/${id}`, { method:'PATCH', body: JSON.stringify({ status }) }); load();
}

let itemCount = 0;
function addItem() {
  itemCount++;
  const div = document.createElement('div');
  div.className = 'field-row'; div.id = `item-${itemCount}`;
  div.innerHTML = `
    <div class="field"><label>Description</label><input id="item-desc-${itemCount}" placeholder="Service or product"></div>
    <div class="field" style="max-width:70px"><label>Qty</label><input id="item-qty-${itemCount}" type="number" value="1" min="1"></div>
    <div class="field" style="max-width:90px"><label>Rate ($)</label><input id="item-rate-${itemCount}" type="number" min="0" step="0.01" placeholder="0"></div>`;
  document.getElementById('items-list').appendChild(div);
}

async function createInvoice() {
  const items = [];
  for (let i = 1; i <= itemCount; i++) {
    const desc = v(`item-desc-${i}`), qty = parseFloat(v(`item-qty-${i}`)), rate = parseFloat(v(`item-rate-${i}`));
    if (desc) items.push({ description: desc, qty: qty||1, rate: rate||0 });
  }
  const body = { client: v('i-client'), dueDate: v('i-due'), items };
  if (!body.client) return;
  await apiFetch('/api/finance/invoices', { method:'POST', body: JSON.stringify(body) });
  closeModal('invoice-modal'); itemCount = 0; document.getElementById('items-list').innerHTML = ''; load();
}

function openLedgerModal()  { document.getElementById('ledger-modal').style.display='flex'; }
function openInvoiceModal() { addItem(); document.getElementById('invoice-modal').style.display='flex'; }

function renderCharts(entries) {
  const rev = entries.filter(e=>e.type==='revenue').reduce((s,e)=>s+e.amount,0);
  const exp = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  new Chart(document.getElementById('chart-rev-exp'), {
    type:'bar',
    data:{ labels:['Revenue','Expenses','Net'], datasets:[{ data:[rev,exp,rev-exp], backgroundColor:['rgba(52,211,153,0.2)','rgba(248,113,113,0.2)',((rev-exp)>=0?'rgba(52,211,153,0.2)':'rgba(248,113,113,0.2)')], borderColor:['#34d399','#f87171',(rev-exp)>=0?'#34d399':'#f87171'], borderWidth:2, borderRadius:6 }] },
    options:{ responsive:true, plugins:{legend:{display:false}}, scales:{ x:{grid:{color:'#1e2130'},ticks:{color:'#5a6480',font:{size:11}}}, y:{grid:{color:'#1e2130'},ticks:{color:'#5a6480',font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'}} } },
  });
  const catMap = {};
  entries.filter(e=>e.type==='expense').forEach(e=>{ catMap[e.category]=(catMap[e.category]||0)+e.amount; });
  const cats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const COLORS = ['#f59e0b','#f87171','#60a5fa','#a78bfa','#34d399','#fb923c'];
  new Chart(document.getElementById('chart-category'), {
    type:'doughnut',
    data:{ labels:cats.map(c=>c[0]), datasets:[{ data:cats.map(c=>c[1]), backgroundColor:COLORS.map(c=>c+'33'), borderColor:COLORS, borderWidth:2 }] },
    options:{ responsive:true, plugins:{ legend:{ position:'bottom', labels:{ color:'#5a6480', font:{size:10}, padding:8 } } }, cutout:'60%' },
  });
}

load();
</script>
</body>
</html>
