<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AI-BOS · Approval Queue</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07080f;--surface:#0e1018;--surface2:#13161f;--border:#1c2035;--border2:#252a40;--text:#e8edf5;--muted:#5a6480;--muted2:#8892aa;--indigo:#6366f1;--indigo2:#818cf8;--indigo-dim:rgba(99,102,241,0.12);--green:#34d399;--amber:#f59e0b;--red:#f87171;--purple:#a78bfa;}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(99,102,241,0.08) 0%,transparent 70%);pointer-events:none}
    #app{position:relative;z-index:1}

    nav{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px}
    .back{text-decoration:none;color:var(--muted2);font-size:0.82rem;transition:color .15s}.back:hover{color:var(--text)}
    .nav-badge{padding:4px 10px;background:var(--indigo-dim);border:1px solid rgba(99,102,241,0.3);color:var(--indigo2);border-radius:20px;font-size:0.78rem;font-weight:600}
    .nav-sub{font-size:0.78rem;color:var(--muted)}
    .nav-spacer{flex:1}
    .btn{padding:7px 14px;border-radius:7px;font-size:0.78rem;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
    .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--border2)}
    .btn-primary{background:var(--indigo);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
    .btn-success{background:rgba(52,211,153,0.15);color:var(--green);border:1px solid rgba(52,211,153,0.3)}.btn-success:hover{background:rgba(52,211,153,0.25)}
    .btn-danger{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.2)}.btn-danger:hover{background:rgba(248,113,113,0.2)}
    .btn-sm{padding:5px 11px;font-size:0.74rem}

    main{max-width:1100px;margin:0 auto;padding:24px}
    .page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px}
    .page-title{font-size:1.3rem;font-weight:700;letter-spacing:-.02em}
    .page-sub{font-size:0.76rem;color:var(--muted);margin-top:3px}

    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
    .kpi-accent{position:absolute;top:0;left:0;right:0;height:2px}
    .kpi-label{font-size:0.67rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px}
    .kpi-value{font-size:1.7rem;font-weight:700;letter-spacing:-.03em}

    .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
    .tab{padding:10px 18px;font-size:0.8rem;color:var(--muted2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
    .tab:hover{color:var(--text)}.tab.active{color:var(--indigo2);border-bottom-color:var(--indigo)}

    .action-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
    .action-card:hover{border-color:var(--border2)}
    .action-card.pending{border-left:3px solid var(--amber)}
    .action-card.executed{border-left:3px solid var(--green);opacity:.75}
    .action-card.rejected{border-left:3px solid var(--red);opacity:.65}
    .action-card.failed{border-left:3px solid var(--red)}
    .action-card.auto-approved{border-left:3px solid var(--indigo)}

    .ac-header{padding:14px 18px 10px;display:flex;align-items:flex-start;gap:12px}
    .ac-agent-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;border:1px solid}
    .ac-info{flex:1;min-width:0}
    .ac-title{font-size:0.86rem;font-weight:600;margin-bottom:3px}
    .ac-desc{font-size:0.74rem;color:var(--muted2);line-height:1.45}
    .ac-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.67rem;font-weight:500;border:1px solid}
    .ac-actions{display:flex;gap:7px;align-items:center;flex-shrink:0}

    .ac-payload{padding:0 18px 14px}
    .ac-payload-box{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 13px;font-size:0.74rem;color:var(--muted2);line-height:1.55}
    .ac-payload-box pre{white-space:pre-wrap;font-family:inherit}

    .result-box{margin-top:8px;padding:8px 12px;border-radius:6px;font-size:0.74rem}
    .result-box.ok{background:rgba(52,211,153,.08);color:var(--green);border:1px solid rgba(52,211,153,.2)}
    .result-box.err{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.2)}

    .empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:0.82rem}

    /* Live indicator */
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .live-dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;margin-right:5px}

    /* Reject modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .modal-bg.open{display:flex}
    .modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:440px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6)}
    .modal-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:0.88rem;font-weight:600}
    .modal-close{background:none;border:none;color:var(--muted);cursor:pointer}
    .modal-bd{padding:16px 18px;display:flex;flex-direction:column;gap:10px}
    .modal-ft{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
    .field label{font-size:0.72rem;color:var(--muted);display:block;margin-bottom:4px}
    .field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:0.8rem;color:var(--text);outline:none;font-family:inherit;resize:vertical}
    .field textarea:focus{border-color:var(--indigo)}
  </style>
</head>
<body>
<div id="app">
  <nav>
    <a href="/dashboard" class="back">← AI-BOS</a>
    <div class="nav-badge">⚡ Approval Queue</div>
    <span class="nav-sub">Agent Actions · Review & Approve</span>
    <div class="nav-spacer"></div>
    <a href="/goals" class="btn btn-ghost" style="text-decoration:none;font-size:0.78rem">🎯 Goals</a>
    <a href="/agent-council" class="btn btn-ghost" style="text-decoration:none;font-size:0.78rem">🤝 Council</a>
  </nav>

  <main>
    <div class="page-header">
      <div>
        <div class="page-title">⚡ Agent Action Queue</div>
        <div class="page-sub"><span class="live-dot"></span>Live — agents queue actions here for your review</div>
      </div>
      <button class="btn btn-ghost" onclick="load()">↺ Refresh</button>
    </div>

    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-accent" style="background:var(--amber)"></div><div class="kpi-label">Pending Approval</div><div class="kpi-value" id="k-pending">–</div></div>
      <div class="kpi-card"><div class="kpi-accent" style="background:var(--indigo)"></div><div class="kpi-label">Auto-Approved</div><div class="kpi-value" id="k-auto">–</div></div>
      <div class="kpi-card"><div class="kpi-accent" style="background:var(--green)"></div><div class="kpi-label">Executed</div><div class="kpi-value" id="k-exec">–</div></div>
      <div class="kpi-card"><div class="kpi-accent" style="background:var(--red)"></div><div class="kpi-label">Rejected / Failed</div><div class="kpi-value" id="k-rej">–</div></div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('pending',this)">⏳ Pending <span id="tab-pending-count" style="font-size:0.7rem;margin-left:3px"></span></div>
      <div class="tab" onclick="switchTab('all',this)">📋 All Actions</div>
      <div class="tab" onclick="switchTab('log',this)">📜 Execution Log</div>
    </div>

    <div id="actions-list"></div>
  </main>
</div>

<!-- REJECT MODAL -->
<div id="reject-modal" class="modal-bg" onclick="closeRejectOuter(event)">
  <div class="modal-box">
    <div class="modal-hd">Reject Action<button class="modal-close" onclick="closeReject()">✕</button></div>
    <div class="modal-bd">
      <div class="field"><label>Reason (optional)</label><textarea id="reject-reason" rows="3" placeholder="Why are you rejecting this action?"></textarea></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeReject()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmReject()">Reject Action</button>
    </div>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('aibos_token');
if (!TOKEN) location.href = '/login';
const WS_ID = localStorage.getItem('aibos_workspace') || 'default';
async function api(url, opts={}) {
  return fetch(url, { headers:{ Authorization:`Bearer ${TOKEN}`, 'x-workspace':WS_ID, 'Content-Type':'application/json', ...(opts.headers||{}) }, ...opts });
}

const TYPE_LABEL = { send_email:'📧 Email', post_slack:'💬 Slack', war_room:'💬 War Room', create_record:'➕ Create Record', update_record:'✏️ Update Record', webhook:'🔗 Webhook' };
const STATUS_COLOR = { pending:'var(--amber)', executed:'var(--green)', rejected:'var(--red)', failed:'var(--red)', 'auto-approved':'var(--indigo)' };

let currentTab = 'pending';
let allQueue = [], logItems = [];
let rejectingId = null;

async function load() {
  const [qR, lR] = await Promise.all([api('/api/actions/queue'), api('/api/actions/log')]);
  allQueue = qR.ok ? await qR.json() : [];
  logItems = lR.ok ? await lR.json() : [];

  const pending = allQueue.filter(a => a.status === 'pending').length;
  const autoApproved = allQueue.filter(a => a.status === 'auto-approved').length;
  const executed = allQueue.filter(a => a.status === 'executed').length;
  const rejected = allQueue.filter(a => a.status === 'rejected' || a.status === 'failed').length;

  document.getElementById('k-pending').textContent = pending;
  document.getElementById('k-auto').textContent = autoApproved;
  document.getElementById('k-exec').textContent = executed;
  document.getElementById('k-rej').textContent = rejected;

  const tc = document.getElementById('tab-pending-count');
  if (tc) tc.textContent = pending > 0 ? `(${pending})` : '';

  renderList();
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const el = document.getElementById('actions-list');
  let items;
  if (currentTab === 'pending') items = allQueue.filter(a => a.status === 'pending');
  else if (currentTab === 'all') items = allQueue;
  else items = logItems;

  if (!items.length) {
    el.innerHTML = `<div class="empty">${currentTab === 'pending' ? '✅ No pending actions — agents are operating autonomously' : 'No actions yet'}</div>`;
    return;
  }

  el.innerHTML = items.map(a => renderAction(a)).join('');
}

function renderAction(a) {
  const statusColor = STATUS_COLOR[a.status] || 'var(--muted)';
  const typeLabel = TYPE_LABEL[a.type] || a.type;
  const ago = timeAgo(a.createdAt);
  const isPending = a.status === 'pending';
  const payloadStr = formatPayload(a.payload);

  return `
    <div class="action-card ${a.status}">
      <div class="ac-header">
        <div class="ac-agent-avatar" style="background:${a.color||'#5a6480'}18;border-color:${a.color||'#5a6480'}33;color:${a.color||'#5a6480'}">${a.emoji||'🤖'}</div>
        <div class="ac-info">
          <div class="ac-title">${a.title}</div>
          <div class="ac-desc">${a.description || ''}</div>
          <div class="ac-meta">
            <span class="badge" style="background:${statusColor}18;color:${statusColor};border-color:${statusColor}33">${a.status}</span>
            <span class="badge" style="background:var(--surface2);color:var(--muted2);border-color:var(--border)">${typeLabel}</span>
            <span class="badge" style="background:${a.color||'#5a6480'}12;color:${a.color||'#5a6480'};border-color:${a.color||'#5a6480'}22">${a.agentName||a.agent}</span>
            <span style="font-size:0.68rem;color:var(--muted)">${ago}</span>
            ${a.autoApprove ? '<span class="badge" style="background:var(--indigo-dim);color:var(--indigo2);border-color:rgba(99,102,241,0.2)">auto</span>' : ''}
          </div>
        </div>
        <div class="ac-actions">
          ${isPending ? `
            <button class="btn btn-success btn-sm" onclick="approve('${a.id}')">✓ Approve</button>
            <button class="btn btn-danger btn-sm" onclick="openReject('${a.id}')">✕ Reject</button>
          ` : ''}
          <button class="btn btn-ghost btn-sm" onclick="togglePayload('payload-${a.id}')">Details</button>
        </div>
      </div>
      <div class="ac-payload" id="payload-${a.id}" style="display:none">
        <div class="ac-payload-box"><pre>${payloadStr}</pre></div>
        ${a.result ? `<div class="result-box ${a.result.error ? 'err' : 'ok'}">${a.result.error ? '❌ ' + a.result.error : '✅ ' + JSON.stringify(a.result)}</div>` : ''}
      </div>
    </div>`;
}

function formatPayload(p) {
  if (!p) return 'No payload';
  const lines = [];
  Object.entries(p).forEach(([k, v]) => {
    const val = typeof v === 'object' ? JSON.stringify(v, null, 2) : String(v).slice(0, 300);
    lines.push(`${k}: ${val}`);
  });
  return lines.join('\n');
}

function togglePayload(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function approve(id) {
  const btn = event.target;
  btn.textContent = '…'; btn.disabled = true;
  const r = await api(`/api/actions/${id}/approve`, { method:'POST' });
  const d = await r.json();
  if (d.error) alert('Error: ' + d.error);
  load();
}

function openReject(id) {
  rejectingId = id;
  document.getElementById('reject-reason').value = '';
  document.getElementById('reject-modal').classList.add('open');
}
function closeReject() { document.getElementById('reject-modal').classList.remove('open'); rejectingId = null; }
function closeRejectOuter(e) { if (e.target === document.getElementById('reject-modal')) closeReject(); }
async function confirmReject() {
  if (!rejectingId) return;
  const reason = document.getElementById('reject-reason').value;
  await api(`/api/actions/${rejectingId}/reject`, { method:'POST', body: JSON.stringify({ reason }) });
  closeReject(); load();
}

function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

// WebSocket for live updates
(function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}`);
  ws.onmessage = e => {
    try {
      const { event } = JSON.parse(e.data);
      if (event.startsWith('action:')) {
        clearTimeout(window._wsTimer);
        window._wsTimer = setTimeout(load, 500);
      }
    } catch {}
  };
  ws.onclose = () => setTimeout(connectWS, 4000);
})();

load();
setInterval(load, 15000);
</script>
</body>
</html>
